services:
  db:
    image: postgres:16-alpine
    container_name: villas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guatemala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: villas_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Guatemala
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: docker-local-villas-del-rosario-key
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: app
      ADMIN_NAME: Administrador
      ADMIN_EMAIL: admin@villasdelrosario.local
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      COBROS_NOTIFICACIONES_AUTO: "false"
      COBROS_NOTIFICACIONES_HORA: 7
      COBROS_NOTIFICACIONES_MINUTO: 0
      COBROS_NOTIFY_TO: ""
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3333:3333"
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "node ace migration:run && node ace app:seed-admin && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: villas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3333
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
